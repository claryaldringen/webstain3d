<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webstain3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        #game-canvas { display: block; width: 100vw; height: calc(100vh - 60px); }
        .screen-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            color: #fff;
            font-family: monospace;
            z-index: 100;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        #hud { position: absolute; bottom: 0; left: 0; width: 100%; }
        #hud-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #545454;
            border-top: 3px solid #808080;
            height: 60px;
            padding: 0 20px;
            font-family: monospace;
            user-select: none;
        }
        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hud-label {
            color: #a0a0a0;
            font-size: 10px;
            letter-spacing: 1px;
        }
        .hud-value {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }
        #hud-face {
            width: 48px;
            height: 48px;
            background: #888;
            border: 2px solid #666;
            image-rendering: pixelated;
            background-size: contain;
        }
        .hud-key {
            width: 16px;
            height: 16px;
            margin: 2px;
            border: 1px solid #333;
        }
        #hud-key-gold.active { background: #FFD700; }
        #hud-key-silver.active { background: #C0C0C0; }
        #hud-keys-container {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="hud">
    <div id="hud-bar">
        <div class="hud-item">
            <span class="hud-label">FLOOR</span>
            <span class="hud-value" id="hud-level">1</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">SCORE</span>
            <span class="hud-value" id="hud-score">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">LIVES</span>
            <span class="hud-value" id="hud-lives">3</span>
        </div>
        <div class="hud-item" id="hud-face-container">
            <div id="hud-face"></div>
        </div>
        <div class="hud-item">
            <span class="hud-label">HEALTH</span>
            <span class="hud-value" id="hud-health">100%</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">AMMO</span>
            <span class="hud-value" id="hud-ammo">8</span>
        </div>
        <div class="hud-item" id="hud-keys-container">
            <div id="hud-key-gold" class="hud-key"></div>
            <div id="hud-key-silver" class="hud-key"></div>
        </div>
    </div>
</div>
    <div id="screen-title" class="screen-overlay">
        <h1 style="font-size:48px;color:#c00;text-shadow:3px 3px #000;">WEBSTAIN 3D</h1>
        <p style="margin-top:20px;animation:blink 1s infinite;">PRESS ANY KEY</p>
    </div>
    <div id="screen-death" class="screen-overlay" style="display:none;">
        <h1 style="color:#c00;">GAME OVER</h1>
    </div>
    <div id="screen-complete" class="screen-overlay" style="display:none;">
        <h1>FLOOR COMPLETE!</h1>
        <div id="level-stats" style="text-align:left;margin-top:20px;"></div>
    </div>
    <div id="screen-pause" class="screen-overlay" style="display:none;">
        <h1>PAUSED</h1>
        <p>Press ESC to resume</p>
    </div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
